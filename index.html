<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101820">
  <meta name="description" content="Agenda móvil para el Congreso C1b3rwall 2026">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Agenda C1b3rwall 2026</title>
  <style>
    :root {
      --px: clamp(12px, 2.5vw, 56px);
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #eef3f8;
      --text: #101820;
      --muted: #607083;
      --line: #d9e2ec;
      --brand: #005a8d;
      --brand-2: #003c5f;
      --accent: #18a999;
      --shadow: 0 12px 34px rgba(16, 24, 32, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c1117;
      --panel: #141b24;
      --panel-2: #1d2834;
      --text: #eef4fb;
      --muted: #9db0c4;
      --line: #2c3a49;
      --brand: #39a7dc;
      --brand-2: #8ed8ff;
      --accent: #25d0bb;
      --shadow: 0 12px 34px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(24, 169, 153, .18), transparent 30rem),
        linear-gradient(180deg, #ecf2f8 0%, var(--bg) 30rem);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    :root[data-theme="dark"] body {
      background:
        radial-gradient(circle at top left, rgba(57, 167, 220, .18), transparent 30rem),
        linear-gradient(180deg, #111b25 0%, var(--bg) 30rem);
    }

    button { border: 0; cursor: pointer; font: inherit; }

    /* Topbar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      padding: calc(12px + env(safe-area-inset-top)) var(--px) 12px;
      background: rgba(245, 247, 251, .92);
      border-bottom: 1px solid rgba(217, 226, 236, .84);
      backdrop-filter: blur(14px);
    }

    :root[data-theme="dark"] .topbar {
      background: rgba(12, 17, 23, .9);
      border-bottom-color: rgba(44, 58, 73, .84);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      display: block;
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      border-radius: 8px;
      object-fit: contain;
      background: var(--panel);
      box-shadow: 0 6px 16px rgba(16, 24, 32, .1);
    }

    h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.15;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .theme-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 4px 12px rgba(16, 24, 32, .08);
      color: var(--text);
      font-size: 1rem;
      transition: background .15s;
    }

    .theme-btn:hover { background: var(--panel-2); }

    /* Thank-you content */
    .thankyou {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px var(--px) 80px;
      text-align: center;
      gap: 0;
    }

    .thankyou-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 12px rgba(24, 169, 153, .3));
    }

    .thankyou-title {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      color: var(--brand-2);
    }

    :root[data-theme="dark"] .thankyou-title {
      color: var(--brand-2);
    }

    .thankyou-sub {
      margin: 0 0 36px;
      font-size: clamp(.95rem, 2.5vw, 1.1rem);
      color: var(--muted);
      max-width: 36ch;
      line-height: 1.6;
    }

    .thankyou-next {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      font-weight: 700;
      color: var(--accent);
    }

    .thankyou-year {
      margin-top: 48px;
      font-size: .8rem;
      color: var(--muted);
      opacity: .7;
    }

    .accent-bar {
      width: 48px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      margin: 0 auto 28px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <img class="logo" src="logo_26.png" alt="C1b3rwall 2026">
        <div>
          <h1>Agenda C1b3rwall 2026</h1>
          <p class="subtitle">Cibercrimen 3.0 · 2, 3 y 4 de junio</p>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn" type="button" aria-label="Cambiar tema">☀</button>
    </div>
  </header>

  <main class="thankyou">
    <div class="thankyou-icon">🛡️</div>
    <h2 class="thankyou-title">¡Gracias por estar en C1b3rwall 2026!</h2>
    <div class="accent-bar"></div>
    <p class="thankyou-sub">
      El congreso ha concluido. Ha sido un placer acompañarte durante estos tres días de ciberseguridad.
    </p>
    <p class="thankyou-next">¡Nos vemos en C1b3rwall 2027!</p>
    <p class="thankyou-year">C1b3rwall 2026 · Agenda no oficial</p>
  </main>

  <script>
    const THEME_KEY = "ciberwall26.theme.v1";
    const root = document.documentElement;
    const btn = document.getElementById("themeBtn");

    function applyTheme(t) {
      root.dataset.theme = t;
      btn.textContent = t === "dark" ? "☀" : "🌙";
      btn.setAttribute("aria-label", t === "dark" ? "Cambiar a tema claro" : "Cambiar a tema oscuro");
    }

    const saved = localStorage.getItem(THEME_KEY);
    const preferred = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(preferred);

    btn.addEventListener("click", () => {
      const next = root.dataset.theme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
