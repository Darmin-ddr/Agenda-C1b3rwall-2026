name: Actualizar programa C1b3rwall

on:
  workflow_dispatch:  # solo manual — congreso finalizado

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Comprobar y actualizar programa
        run: python scripts/update_programa.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .last-program-update ponentes.json .last-ponentes-hash
          git diff --staged --quiet || git commit -m "Auto-update programa $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
