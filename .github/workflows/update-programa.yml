name: Actualizar programa C1b3rwall

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
  workflow_dispatch:          # también ejecutable manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Comprobar y actualizar programa
        run: python scripts/update_programa.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .last-program-update
          git diff --staged --quiet || git commit -m "Auto-update programa $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
